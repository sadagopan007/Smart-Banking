{% extends "base.html" %}
{% block title %}Notifications – SmartBank{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <h4 class="fw-700 mb-4"><i class="bi bi-bell text-accent me-2"></i>Notifications</h4>

      <div class="sb-card">
        <div class="sb-card-body p-0">
          {% if notifs %}
          {% for n in notifs %}
          <div class="d-flex align-items-start gap-3 p-3 {% if not n[2] %}notif-unread{% endif %}"
               style="border-bottom: 1px solid var(--border);">
            <div class="mt-1" style="width:8px;height:8px;border-radius:50%;background:{% if not n[2] %}var(--accent){% else %}var(--border){% endif %};flex-shrink:0;margin-top:6px;"></div>
            <div class="flex-grow-1">
              <p class="mb-0 small {% if not n[2] %}fw-600{% endif %}">{{ n[1] }}</p>
              <small class="text-muted">{{ n[3].strftime("%d %b %Y, %H:%M") }}</small>
            </div>
          </div>
          {% endfor %}
          {% else %}
          <div class="empty-state py-5">
            <i class="bi bi-bell-slash fs-1 text-muted"></i>
            <p class="text-muted mt-3">No notifications yet.</p>
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
