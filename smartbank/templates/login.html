{% extends "base.html" %}
{% block title %}Login – SmartBank{% endblock %}

{% block content %}
<div class="auth-bg">
  <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="brand-icon mx-auto mb-3"><i class="bi bi-bank2"></i></div>
        <h3 class="fw-700">Welcome Back</h3>
        <p class="text-muted small">Sign in to your SmartBank account</p>
      </div>

      <form method="POST" novalidate>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group sb-input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" name="email" placeholder="you@example.com" required autofocus/>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <div class="input-group sb-input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" name="password" id="password" placeholder="••••••••" required/>
            <button class="btn btn-ghost" type="button" id="togglePwd">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-accent w-100 py-2 fw-600">
          <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
        </button>
      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        No account? <a href="{{ url_for('register') }}" class="text-accent">Create one free</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  document.getElementById("togglePwd").addEventListener("click", function(){
    const pwd = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");
    if(pwd.type === "password"){ pwd.type = "text"; icon.className = "bi bi-eye-slash"; }
    else { pwd.type = "password"; icon.className = "bi bi-eye"; }
  });
</script>
{% endblock %}
