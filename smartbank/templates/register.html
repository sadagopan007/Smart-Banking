{% extends "base.html" %}
{% block title %}Register – SmartBank{% endblock %}

{% block content %}
<div class="auth-bg">
  <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="brand-icon mx-auto mb-3"><i class="bi bi-bank2"></i></div>
        <h3 class="fw-700">Create Account</h3>
        <p class="text-muted small">Join SmartBank — it only takes a minute</p>
      </div>

      <form method="POST" id="registerForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <div class="input-group sb-input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" name="full_name" placeholder="Sadagopan R" required/>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <div class="input-group sb-input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" class="form-control" name="email" placeholder="you@example.com" required/>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Account Type</label>
          <div class="input-group sb-input-group">
            <span class="input-group-text"><i class="bi bi-credit-card"></i></span>
            <select class="form-select" name="account_type">
              <option value="savings">Savings Account (3.5% interest)</option>
              <option value="current">Current Account (₹10,000 overdraft)</option>
            </select>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group sb-input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" name="password" id="password"
                   placeholder="Min 8 characters" required/>
            <button class="btn btn-ghost" type="button" id="togglePwd">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
          <!-- Password strength bar -->
          <div class="strength-bar mt-2">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <small class="text-muted" id="strengthLabel"></small>
        </div>

        <button type="submit" class="btn btn-accent w-100 py-2 mt-2 fw-600">
          <i class="bi bi-person-plus me-2"></i>Create Account
        </button>
      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        Already have an account? <a href="{{ url_for('login') }}" class="text-accent">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  // Password visibility toggle
  document.getElementById("togglePwd").addEventListener("click", function(){
    const pwd = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");
    if(pwd.type === "password"){ pwd.type = "text"; icon.className = "bi bi-eye-slash"; }
    else { pwd.type = "password"; icon.className = "bi bi-eye"; }
  });

  // Password strength meter
  document.getElementById("password").addEventListener("input", function(){
    const val = this.value;
    const fill = document.getElementById("strengthFill");
    const label = document.getElementById("strengthLabel");
    let score = 0;
    if(val.length >= 8) score++;
    if(/[A-Z]/.test(val)) score++;
    if(/[0-9]/.test(val)) score++;
    if(/[^A-Za-z0-9]/.test(val)) score++;

    const colors = ["#ef4444","#f97316","#eab308","#22c55e"];
    const labels = ["Weak","Fair","Good","Strong"];
    fill.style.width = (score * 25) + "%";
    fill.style.background = colors[score - 1] || "#ef4444";
    label.textContent = val.length ? labels[score - 1] || "Weak" : "";
    label.style.color = colors[score - 1] || "#ef4444";
  });
</script>
{% endblock %}
